<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redis SDS Animation</title>
    <script type="text/javascript">
      var pathSegments = window.location.pathname.split('/').filter(Boolean);
      if (pathSegments.length > 0) {
        var repoPrefix = '/' + pathSegments[0] + '/';
        window.location.href = repoPrefix + '?' + window.location.pathname;
      }
    </script>
  </head>
  <body>
    <p>Redirecting...</p>
  </body>
</html>
